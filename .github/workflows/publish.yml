name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Clean non-English docs before publish
        run: rm -f README.tr.md CONTRIBUTING*.md SECURITY*.md CODE_OF_CONDUCT.md CLAUDE.md

      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
