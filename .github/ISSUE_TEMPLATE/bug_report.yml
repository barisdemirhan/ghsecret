name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: ghsecret version
      description: Run `ghsecret --version` and paste the output
      placeholder: "ghsecret v1.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: "When I run `ghsecret -s -a`, it fails with..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1. Create a `.env` file with...
        2. Run `ghsecret ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Your system info
      value: |
        - OS: [e.g., macOS 15, Ubuntu 24.04]
        - Node: [e.g., 20.11.0]
        - gh CLI: [e.g., 2.50.0]
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any error output (redact secrets!)
      render: shell
